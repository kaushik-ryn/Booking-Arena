        <div class="container">
          <h1></h1>
      
          <div class="search-box">
            <div class="multi-city">🔁 Create a multi-city route</div>
      
            <div class="form-row">
              <div class="form-group">
                <label>From</label>
                <input type="text" id="fromInput" placeholder="Indira Gandhi International ..." />
                <div class="checkbox-row">
                  <input type="checkbox" id="fromNearby" />
                  <label for="fromNearby">Add nearby airports</label>
                </div>
              </div>
      
              <div class="form-group">

                <div class="checkbox-row">

                </div>
              </div>
      
              <div class="form-group">
                <label>Depart</label>
                <input type="date" id="departInput"/>
              </div>
      
              <div class="form-group">

              </div>
      
              <div class="form-group">
                <label>Travellers and cabin class</label>
                <select id="travellerInput">
                  <option>1 Adult, Economy</option>
                  <option>2 Adults, Economy</option>
                  <option>1 Adult, Business</option>
                </select>
              </div>
      
              <div class="form-group" style="display: flex; align-items: end;">
                <button class="search-btn" onclick="searchFlights()">Search</button>
              </div>
            </div>

            </div>
            <div style="margin-top: 20px; background:#1d3a8324 ; padding: 20px; border-radius: 10px; color: black;">
              <h3>Filters & Sorting</h3>
              <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                
                <div>
                  <label><strong>Airlines:</strong></label><br/>
                  <input type="checkbox" class="airline-filter" value="IndiGo" checked> IndiGo<br/>
                  <input type="checkbox" class="airline-filter" value="Air India" checked> Air India<br/>
                  <input type="checkbox" class="airline-filter" value="Vistara" checked> Vistara
                </div>
            
                <div>
                  <label for="maxPrice"><strong>Max Price (₹):</strong></label><br/>
                  <input type="range" id="maxPrice" min="1000" max="10000" value="10000" style="width: 200px;" oninput="document.getElementById('priceDisplay').textContent = this.value">
                  <span id="priceDisplay">10000</span>
                </div>
            
                <div>
                  <label for="sortBy"><strong>Sort By:</strong></label><br/>

                    <option value="timeEarly">Departure Time: Early to Late</option>
                    <option value="timeLate">Departure Time: Late to Early</option>

              </div>

        <script>
          const airlineLogos = {
            "IndiGo": "https://work4freshers.com/wp-content/uploads/2022/04/Copy-of-Copy-of-Copy-of-Pastel-Abstract-New-Blog-Instagram-Post-7.jpg",
            "Air India": "https://tse2.mm.bing.net/th/id/OIP.JVEVbhEXLldO_3CTSeQyiQHaEK?w=3840&h=2160&rs=1&pid=ImgDetMain",
            "Vistara": "https://tse1.mm.bing.net/th/id/OIP.NSj6dbp119bv1WxLEur_UAHaEK?rs=1&pid=ImgDetMain"
          };
        
          const dummyFlights = [
            {
              flight: "IndiGo 6E-203",
              airline: "IndiGo",
              from: "Delhi",
              to: "Mumbai",
              seats: 8,
              price: 4999,
              time: "08:00 AM"
            },
            {
              flight: "Air India AI-301",
              airline: "Air India",
              from: "Delhi",
              to: "Mumbai",
              seats: 4,
              price: 5799,
              time: "11:30 AM"
            },
            {
              flight: "Vistara UK-902",
              airline: "Vistara",
              from: "Delhi",
              to: "Mumbai",
              seats: 6,
              price: 5499,
              time: "03:45 PM"
            }
          ];
      function searchFlights() {
        const from = document.getElementById('fromInput').value.trim().toLowerCase();
        const to = document.getElementById('toInput').value.trim().toLowerCase();
        const depart = document.getElementById('departInput').value;
        const ret = document.getElementById('returnInput').value;
        const maxPrice = parseInt(document.getElementById('maxPrice').value);
        const sortBy = document.getElementById('sortBy').value;
        
        const airlineCheckboxes = document.querySelectorAll('.airline-filter:checked');
        const selectedAirlines = Array.from(airlineCheckboxes).map(cb => cb.value);
      
        const resultsContainer = document.getElementById('results');
        resultsContainer.innerHTML = "<h2>Showing flights:</h2>";
      
        let filtered = dummyFlights.filter(f =>
          f.from.toLowerCase().includes(from) &&
          f.to.toLowerCase().includes(to) &&
          selectedAirlines.includes(f.airline) &&
          f.price <= maxPrice
        );
      
        if (sortBy === "priceLow") {
          filtered.sort((a, b) => a.price - b.price);
        } else if (sortBy === "priceHigh") {
          filtered.sort((a, b) => b.price - a.price);
        } else if (sortBy === "timeEarly") {
          filtered.sort((a, b) => toMinutes(a.time) - toMinutes(b.time));
        } else if (sortBy === "timeLate") {
          filtered.sort((a, b) => toMinutes(b.time) - toMinutes(a.time));
        }
      
        if (filtered.length === 0) {
  resultsContainer.innerHTML += "<p>No flights found for the selected filters.</p>";
  return;
}

filtered.forEach((f, index) => {
  const logo = airlineLogos[f.airline] || "";
  const card = document.createElement("div");
  card.className = "flight-card";
  card.style.animationDelay = `${index * 100}ms`;

  card.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h3>
          <img src="${logo}" class="airline-logo" alt="${f.airline} logo"/>
          ${f.flight}
        </h3>
        <div class="flight-info">🛫 ${f.from} → ${f.to}</div>
        <div class="flight-info">📅 Depart: ${depart || "N/A"} | Return: ${ret || "N/A"}</div>
        <div class="flight-info">🕓 Time: ${f.time}</div>
        <div class="flight-info">🪑 ${f.seats} seats available</div>
      </div>
      <div style="text-align: right;">
        <div class="price">₹${f.price}</div>
        <button class="search-btn" style="margin-top: 10px;" onclick='bookFlight(${JSON.stringify(f)})'>Book Now</button>
      </div>
    </div>
  `;

  resultsContainer.appendChild(card);
});

      }
      
      // Utility: convert time like "08:00 AM" to minutes since midnight
      function toMinutes(timeStr) {
        const [time, period] = timeStr.split(' ');
        let [h, m] = time.split(':').map(Number);
        if (period === "PM" && h !== 12) h += 12;
        if (period === "AM" && h === 12) h = 0;
        return h * 60 + m;
      }
      
      
        
          function bookFlight(flight) {
            localStorage.setItem('selectedFlight', JSON.stringify(flight));
            window.location.href = "Fbooking.html";
          }
        </script>
